name: Build release binaries

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach the built binaries to"
        required: true
        default: "v1.1.0"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify animation assets
        run: python tools/verify_assets.py

      - name: Generate Windows icon
        run: python -c "from PIL import Image; im = Image.open('assets/dragon_icon.png').convert('RGBA'); im.save('assets/dragon_icon.ico', sizes=[(16,16),(24,24),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      - name: Build DragonTop.exe
        run: pyinstaller --clean --noconfirm DragonTop.spec

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/DragonTop.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify animation assets
        run: python tools/verify_assets.py

      - name: Generate macOS icon
        run: python -c "from PIL import Image; im = Image.open('assets/dragon_icon.png').convert('RGBA'); im.save('assets/dragon_icon.icns')"

      - name: Build DragonTop.app
        run: pyinstaller --clean --noconfirm DragonTop.spec

      - name: Package DragonTop.dmg
        run: |
          mkdir dmg_staging
          cp -R dist/DragonTop.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname DragonTop -srcfolder dmg_staging -ov -format UDZO dist/DragonTop.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/DragonTop.dmg

  publish:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist-windows

      - uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: dist-macos

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload binaries to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            dist-windows/DragonTop.exe \
            dist-macos/DragonTop.dmg \
            --clobber
